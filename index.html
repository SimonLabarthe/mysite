<!-- Says that we use HTML5 -->
<!DOCTYPE html>

<html lang="fr">

<!-- invisible info for the reader -->
<head>
  
  <!-- for special characters -->
  <meta charset="UTF-8"> 

  <!-- appears in the navigacy outlet, not the page itself -->
  <title> My Site </title>
  
</head>

<!-- what appears on the screen -->
<body>

  <!-- h1 = title level 1 (the biggest) -->
  <h1> Hello World </h1>

</body>
